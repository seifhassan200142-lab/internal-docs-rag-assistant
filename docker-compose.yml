services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: internal-docs-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

  api:
    build: .
    container_name: internal-docs-rag-api
    env_file:
      - .env
    environment:
      QDRANT_URL: http://qdrant:6333
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    depends_on:
      - qdrant

volumes:
  qdrant_storage:
